services:
  mongo:
    image: mongo:7
    container_name: atp-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: ai-task-platform
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - atp-net

  redis:
    image: redis:7-alpine
    container_name: atp-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - atp-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: atp-backend
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://mongo:27017/ai-task-platform
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    ports:
      - "5000:5000"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - atp-net

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: atp-worker
    restart: unless-stopped
    env_file: .env
    environment:
      MONGODB_URI: mongodb://mongo:27017/ai-task-platform
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - atp-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:5000/api
    container_name: atp-frontend
    restart: unless-stopped
    ports:
      - "3000:8080"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - atp-net

volumes:
  mongo_data:
  redis_data:

networks:
  atp-net:
    driver: bridge