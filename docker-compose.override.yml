# Local dev overrides – not committed to production deployments
version: "3.9"

services:
  backend:
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug
      CORS_ORIGIN: http://localhost:3000,http://localhost:5173
    volumes:
      - ./backend/src:/app/src:ro

  worker:
    environment:
      QUEUE_NAME: tasks
      WORKER_CONCURRENCY: "2"
    volumes:
      - ./worker/src:/app/src:ro

  mongo:
    ports:
      - "27017:27017"

  redis:
    ports:
      - "6379:6379"
